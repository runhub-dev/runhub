apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: runhub
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - name: argo-cd
            repoURL: https://argoproj.github.io/argo-helm
            targetRevision: 6.0.7
            chart: argo-cd
            values: |
              configs:
                cm:
                  admin.enabled: false
                  users.anonymous.enabled: true
                params:
                  applicationsetcontroller.enable.progressive.syncs: true
                  server.insecure: true
                rbac:
                  policy.default: role:admin
              repoServer:
                volumeMounts:
                  - mountPath: /runhub
                    name: runhub
                    readOnly: true
                volumes:
                  - name: runhub
                    hostPath:
                      path: /runhub
                      type: Directory
              server:
                service:
                  type: LoadBalancer
            namespace: argocd
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - argo-cd
  template:
    metadata:
      name: "{{ `{{ .name }}` }}"
      labels:
        app.kubernetes.io/name: "{{ `{{ .name }}` }}"
    spec:
      project: runhub
      source:
        repoURL: "{{ `{{ .repoURL }}` }}"
        targetRevision: "{{ `{{ .targetRevision }}` }}"
        chart: "{{ `{{ .chart }}` }}"
        helm:
          values: "{{ `{{ .values }}` }}"
      destination:
        name: in-cluster
        namespace: "{{ `{{ .namespace }}` }}"
