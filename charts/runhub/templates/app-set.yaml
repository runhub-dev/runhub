apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: runhub
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - name: argo-cd
            repoURL: https://argoproj.github.io/argo-helm
            targetRevision: 6.6.0
            chart: argo-cd
            valuesObject:
              configs:
                cm:
                  admin.enabled: false
                  application.resourceTrackingMethod: annotation
                  users.anonymous.enabled: true
                params:
                  applicationsetcontroller.enable.progressive.syncs: true
                  server.insecure: true
                rbac:
                  policy.default: role:admin
              repoServer:
                volumeMounts:
                  - mountPath: /runhub
                    name: runhub
                    readOnly: true
                volumes:
                  - name: runhub
                    hostPath:
                      path: /runhub
                      type: Directory
              server:
                service:
                  servicePortHttpsName: grpc
            namespace: argocd
          - name: istio-base
            repoURL: https://istio-release.storage.googleapis.com/charts
            targetRevision: 1.20.3
            chart: base
            namespace: istio-system
            ignoreDifferences:
              - group: "*"
                kind: "*"
                managedFieldsManagers:
                  - pilot-discovery
          - name: istiod
            repoURL: https://istio-release.storage.googleapis.com/charts
            targetRevision: 1.20.3
            chart: istiod
            namespace: istio-system
          - name: istio-ingressgateway
            repoURL: https://istio-release.storage.googleapis.com/charts
            targetRevision: 1.20.3
            chart: gateway
            namespace: istio-system
          - name: runhub-network
            repoURL: "{{ .Values.repository }}"
            targetRevision: "{{ .Values.revision }}"
            path: charts/runhub-network
            namespace: runhub
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: runhub.dev/name
              operator: In
              values:
                - argo-cd
        - matchExpressions:
            - key: runhub.dev/name
              operator: In
              values:
                - istio-base
        - matchExpressions:
            - key: runhub.dev/name
              operator: In
              values:
                - istiod
        - matchExpressions:
            - key: runhub.dev/name
              operator: In
              values:
                - istio-ingressgateway
        - matchExpressions:
            - key: runhub.dev/name
              operator: In
              values:
                - runhub-network
  template:
    metadata:
      name: "{{ `{{ .name }}` }}"
      labels:
        runhub.dev/name: "{{ `{{ .name }}` }}"
    spec:
      project: runhub
      source:
        repoURL: "{{ `{{ .repoURL }}` }}"
        targetRevision: "{{ `{{ .targetRevision }}` }}"
      destination:
        name: in-cluster
        namespace: "{{ `{{ .namespace }}` }}"
      syncPolicy:
        automated:
          prune: true
  templatePatch: |
    spec:
      source:
        {{ `{{- if hasKey . "chart" }}` }}
        chart: {{ `{{ .chart }}` }}
        {{ `{{- else }}` }}
        path: {{ `{{ .path }}` }}
        {{ `{{- end }}` }}
        {{ `{{- if hasKey . "valuesObject" }}` }}
        helm:
          values: |
            {{ `{{ toYaml .valuesObject | indent 8 | trim }}` }}
        {{ `{{- end }}` }}
      {{ `{{- if hasKey . "ignoreDifferences" }}` }}
      ignoreDifferences: {{ `{{ toYaml .ignoreDifferences | nindent 8 }}` }}
      {{ `{{- end }}` }}
