apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: runhub
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - name: argo-cd
            repoURL: https://argoproj.github.io/argo-helm
            targetRevision: 6.7.3
            chart: argo-cd
            valuesObject:
              applicationSet:
                allowAnyNamespace: true
              configs:
                cm:
                  admin.enabled: false
                  application.resourceTrackingMethod: annotation
                  resource.customizations: |
                    argoproj.io/ApplicationSet:
                      health.lua: |
                        local hs = {}
                        hs.status = "Progressing"
                        hs.message = ""

                        if obj.status ~= nil then
                          if obj.status.conditions ~= nil then
                            for i, condition in pairs(obj.status.conditions) do
                              if condition.type == "ErrorOccurred" and condition.status == "True" then
                                hs.status = "Degraded"
                                hs.message = condition.message
                                return hs
                              end
                              if condition.type == "ResourcesUpToDate" and condition.status == "True" then
                                if obj.spec.strategy ~= nil and obj.spec.strategy.type == "RollingSync" then
                                  if obj.status.applicationStatus ~= nil then
                                    for i, applicationStatus in pairs(obj.status.applicationStatus) do
                                      if applicationStatus.status ~= "Healthy" then
                                        hs.message = applicationStatus.application .. ": " .. applicationStatus.message
                                        return hs
                                      end
                                    end
                                    hs.status = "Healthy"
                                    hs.message = condition.message
                                    return hs
                                  end
                                else
                                  hs.status = "Healthy"
                                  hs.message = condition.message
                                  return hs
                                end
                              end
                            end
                          end
                        end

                        return hs
                  users.anonymous.enabled: true
                params:
                  application.namespaces: runhub
                  applicationsetcontroller.allowed.scm.providers: false
                  applicationsetcontroller.enable.progressive.syncs: true
                  applicationsetcontroller.namespaces: runhub
                  server.insecure: true
                rbac:
                  policy.default: role:admin
              repoServer:
                volumeMounts:
                  - mountPath: /runhub
                    name: runhub
                    readOnly: true
                volumes:
                  - name: runhub
                    hostPath:
                      path: /runhub
                      type: Directory
              server:
                service:
                  servicePortHttpsName: grpc
            namespace: argocd
          - name: istio
            repoURL: "{{ .Values.runhubRepository }}"
            targetRevision: "{{ .Values.runhubRevision }}"
            path: charts/istio
            namespace: "{{ .Release.Namespace }}"
          - name: runhub-network
            repoURL: "{{ .Values.runhubRepository }}"
            targetRevision: "{{ .Values.runhubRevision }}"
            path: charts/runhub-network
            namespace: "{{ .Release.Namespace }}"
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - "{{ .Release.Namespace }}-argo-cd"
        - matchExpressions:
            - key: app
              operator: In
              values:
                - "{{ .Release.Namespace }}-istio"
        - matchExpressions:
            - key: app
              operator: In
              values:
                - "{{ .Release.Namespace }}-runhub-network"
  template:
    metadata:
      name: "{{ `{{ .name }}` }}"
      labels:
        app: "{{ .Release.Namespace }}-{{ `{{ .name }}` }}"
    spec:
      project: runhub
      source:
        repoURL: "{{ `{{ .repoURL }}` }}"
        targetRevision: "{{ `{{ .targetRevision }}` }}"
      destination:
        name: in-cluster
        namespace: "{{ `{{ .namespace }}` }}"
      syncPolicy:
        automated:
          prune: true
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    spec:
      source:
        {{ `{{- if hasKey . "chart" }}` }}
        chart: {{ `{{ .chart }}` }}
        {{ `{{- else }}` }}
        path: {{ `{{ .path }}` }}
        {{ `{{- end }}` }}
        {{ `{{- if hasKey . "valuesObject" }}` }}
        helm:
          values: |
            {{ `{{ toYaml .valuesObject | indent 8 | trim }}` }}
        {{ `{{- end }}` }}
