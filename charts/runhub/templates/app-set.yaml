apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: runhub
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - name: argo-cd
            repoURL: https://argoproj.github.io/argo-helm
            targetRevision: 6.6.0
            chart: argo-cd
            valuesObject:
              applicationSet:
                allowAnyNamespace: true
              configs:
                cm:
                  admin.enabled: false
                  application.resourceTrackingMethod: annotation
                  resource.customizations: |
                    argoproj.io/Application:
                      health.lua: |
                        hs = {}
                        hs.status = "Progressing"
                        hs.message = ""
                        if obj.status ~= nil then
                          if obj.status.health ~= nil then
                            hs.status = obj.status.health.status
                            if obj.status.health.message ~= nil then
                              hs.message = obj.status.health.message
                            end
                          end
                        end
                        return hs
                  users.anonymous.enabled: true
                params:
                  application.namespaces: runhub
                  applicationsetcontroller.allowed.scm.providers: false
                  applicationsetcontroller.enable.progressive.syncs: true
                  applicationsetcontroller.namespaces: runhub
                  server.insecure: true
                rbac:
                  policy.default: role:admin
              repoServer:
                volumeMounts:
                  - mountPath: /runhub
                    name: runhub
                    readOnly: true
                volumes:
                  - name: runhub
                    hostPath:
                      path: /runhub
                      type: Directory
              server:
                service:
                  servicePortHttpsName: grpc
            namespace: argocd
          - name: runhub-istio
            repoURL: "{{ .Values.repository }}"
            targetRevision: "{{ .Values.revision }}"
            path: charts/runhub-istio
            namespace: runhub
          - name: runhub-network
            repoURL: "{{ .Values.repository }}"
            targetRevision: "{{ .Values.revision }}"
            path: charts/runhub-network
            namespace: runhub
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: runhub.dev/name
              operator: In
              values:
                - argo-cd
        - matchExpressions:
            - key: runhub.dev/name
              operator: In
              values:
                - runhub-istio
        - matchExpressions:
            - key: runhub.dev/name
              operator: In
              values:
                - runhub-network
  template:
    metadata:
      name: "{{ `{{ .name }}` }}"
      labels:
        runhub.dev/name: "{{ `{{ .name }}` }}"
    spec:
      project: runhub
      source:
        repoURL: "{{ `{{ .repoURL }}` }}"
        targetRevision: "{{ `{{ .targetRevision }}` }}"
      destination:
        name: in-cluster
        namespace: "{{ `{{ .namespace }}` }}"
      syncPolicy:
        automated:
          prune: true
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    spec:
      source:
        {{ `{{- if hasKey . "chart" }}` }}
        chart: {{ `{{ .chart }}` }}
        {{ `{{- else }}` }}
        path: {{ `{{ .path }}` }}
        {{ `{{- end }}` }}
        {{ `{{- if hasKey . "valuesObject" }}` }}
        helm:
          values: |
            {{ `{{ toYaml .valuesObject | indent 8 | trim }}` }}
        {{ `{{- end }}` }}
