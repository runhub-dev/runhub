apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: runhub
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - name: argo-cd
            repoURL: https://argoproj.github.io/argo-helm
            targetRevision: 6.7.11
            chart: argo-cd
            releaseName: argocd
            valuesObject:
              configs:
                cm:
                  admin.enabled: false
                  resource.customizations: |
                    serving.knative.dev/*:
                      health.lua: |
                        local hs = {}
                        hs.status = "Progressing"
                        hs.message = ""

                        if obj.status ~= nil then
                          if obj.status.conditions ~= nil then
                            for i, condition in pairs(obj.status.conditions) do
                              if condition.type == "Ready" and condition.status == "True" then
                                hs.status = "Healthy"
                                return hs
                              end
                            end
                          end
                        end

                        return hs
                  users.anonymous.enabled: true
                params:
                  applicationsetcontroller.enable.progressive.syncs: true
                  server.insecure: true
                rbac:
                  policy.default: role:admin
              repoServer:
                volumeMounts:
                  - mountPath: /runhub
                    name: runhub
                    readOnly: true
                volumes:
                  - name: runhub
                    hostPath:
                      path: /runhub
                      type: Directory
              server:
                service:
                  servicePortHttpsName: grpc
            namespace: argocd
          - name: istio-base
            repoURL: https://istio-release.storage.googleapis.com/charts
            targetRevision: 1.20.5
            chart: base
            namespace: istio-system
            ignoreDifferences:
              - group: "*"
                kind: "*"
                managedFieldsManagers:
                  - pilot-discovery
          - name: istiod
            repoURL: https://istio-release.storage.googleapis.com/charts
            targetRevision: 1.20.5
            chart: istiod
            namespace: istio-system
          - name: istio-ingressgateway
            repoURL: https://istio-release.storage.googleapis.com/charts
            targetRevision: 1.20.5
            chart: gateway
            namespace: istio-system
          - name: knative-operator
            repoURL: "{{ .Values.runhub.repository }}"
            targetRevision: "{{ .Values.runhub.revision }}"
            path: kustomizations/knative-operator
            namespace: knative-operator
            ignoreDifferences:
              - group: "*"
                kind: "*"
                managedFieldsManagers:
                  - clusterrole-aggregation-controller
          - name: runhub-network
            repoURL: "{{ .Values.runhub.repository }}"
            targetRevision: "{{ .Values.runhub.revision }}"
            path: charts/runhub-network
            namespace: "{{ .Release.Namespace }}"
          - name: knative-serving
            repoURL: "{{ .Values.runhub.repository }}"
            targetRevision: "{{ .Values.runhub.revision }}"
            path: charts/knative-serving
            namespace: knative-serving
          #{{ if .Values.apps }}
          - name: apps
            repoURL: "{{ .Values.runhub.repository }}"
            targetRevision: "{{ .Values.runhub.revision }}"
            path: charts/apps
            valuesObject: #{{ toYaml .Values | nindent 14 }}
            namespace: "{{ .Release.Namespace }}"
          #{{ end }}
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - argo-cd
        - matchExpressions:
            - key: app
              operator: In
              values:
                - istio-base
        - matchExpressions:
            - key: app
              operator: In
              values:
                - istiod
        - matchExpressions:
            - key: app
              operator: In
              values:
                - istio-ingressgateway
        - matchExpressions:
            - key: app
              operator: In
              values:
                - runhub-network
        - matchExpressions:
            - key: app
              operator: In
              values:
                - knative-operator
        - matchExpressions:
            - key: app
              operator: In
              values:
                - knative-serving
        #{{ if .Values.apps }}
        - matchExpressions:
            - key: app
              operator: In
              values:
                - apps
        #{{ end }}
  template:
    metadata:
      name: "{{ `{{ .name }}` }}"
      labels:
        app: "{{ `{{ .name }}` }}"
    spec:
      project: runhub
      source:
        repoURL: "{{ `{{ .repoURL }}` }}"
        targetRevision: "{{ `{{ .targetRevision }}` }}"
      destination:
        name: in-cluster
        namespace: "{{ `{{ .namespace }}` }}"
      syncPolicy:
        automated:
          prune: true
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    spec:
      source:
        {{ `{{- if hasKey . "chart" }}` }}
        chart: "{{ `{{ .chart }}` }}"
        {{ `{{- else }}` }}
        path: "{{ `{{ .path }}` }}"
        {{ `{{- end }}` }}
        {{ `{{- if or (hasKey . "releaseName") (hasKey . "valuesObject") }}` }}
        helm:
          {{ `{{- if hasKey . "releaseName" }}` }}
          releaseName: "{{ `{{ .releaseName }}` }}"
          {{ `{{- end }}` }}
          {{ `{{- if hasKey . "valuesObject" }}` }}
          values: |{{ `{{ toYaml .valuesObject | nindent 8 }}` }}
          {{ `{{- end }}` }}
        {{ `{{- end }}` }}
    {{ `{{- if hasKey . "ignoreDifferences" }}` }}
      ignoreDifferences: {{ `{{ toYaml .ignoreDifferences | nindent 8 }}` }}
    {{ `{{- end }}` }}
