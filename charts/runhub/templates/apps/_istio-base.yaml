#{{ define "runhub.app.istio-base" }}
metadata:
  name: istio-base
  labels:
    app: istio-base
spec:
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      targetRevision: 1.20.5
      chart: base
    - repoURL: "{{ .Values.runhub.repository }}"
      targetRevision: "{{ .Values.runhub.revision }}"
      path: charts/namespace
  destination:
    name: in-cluster
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
    retry:
      limit: 0
  ignoreDifferences:
    - group: "*"
      kind: "*"
      managedFieldsManagers:
        - pilot-discovery
#{{ end }}
