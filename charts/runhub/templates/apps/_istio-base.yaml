#{{ define "runhub.app.istio-base" }}
metadata:
  name: istio-base
  labels:
    app: istio-base
spec:
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    targetRevision: 1.20.5
    chart: base
  destination:
    name: in-cluster
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
    retry:
      limit: 0
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: "*"
      kind: "*"
      managedFieldsManagers:
        - pilot-discovery
#{{ end }}
