#{{ define "runhub.app.runhub-routes" }}
metadata:
  name: runhub-routes
  labels:
    app: runhub-routes
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  source:
    repoURL: "{{ .Values.runhub.repository }}"
    targetRevision: "{{ .Values.runhub.revision }}"
    path: charts/runhub-routes
  destination:
    name: in-cluster
    namespace: "{{ .Release.Namespace }}"
  syncPolicy:
    automated:
      prune: true
    retry:
      limit: 0
#{{ end }}
