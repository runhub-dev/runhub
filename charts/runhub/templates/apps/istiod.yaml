apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: runhub
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    targetRevision: 1.21.2
    chart: istiod
  destination:
    name: in-cluster
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
    retry: {}
