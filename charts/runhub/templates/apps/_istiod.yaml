#{{ define "runhub.app.istiod" }}
metadata:
  name: istiod
  labels:
    app: istiod
spec:
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    targetRevision: 1.20.5
    chart: istiod
  destination:
    name: in-cluster
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
#{{ end }}
