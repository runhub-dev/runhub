#{{ define "runhub.app.istiod" }}
metadata:
  name: istiod
  labels:
    app: istiod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    targetRevision: 1.20.6
    chart: istiod
  destination:
    name: in-cluster
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
    retry:
      limit: 0
#{{ end }}
