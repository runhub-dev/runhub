apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          #{{ range $appName, $app := .Values.apps }}
          - name: "{{ $appName }}"
            repository: "{{ $app.repository }}"
            revision: "{{ $app.revision }}"
          #{{ end }}
  template:
    metadata:
      name: "runhub-app-{{ `{{ .name }}` }}"
    spec:
      project: "runhub-app-{{ `{{ .name }}` }}"
      sources:
        - repoURL: "{{ .Values.runhub.repository }}"
          targetRevision: "{{ .Values.runhub.revision }}"
          path: charts/app
          helm:
            valueFiles:
              - $appRepository/runhub-app.yaml
            values: |
              runhub:
                repository: "{{ .Values.runhub.repository }}"
                revision: "{{ .Values.runhub.revision }}"
              repository: "{{ `{{ .repository }}` }}"
              revision: "{{ `{{ .revision }}` }}"
        - repoURL: "{{ `{{ .repository }}` }}"
          targetRevision: "{{ `{{ .revision }}` }}"
          ref: appRepository
      destination:
        name: in-cluster
        namespace: "runhub-app-{{ `{{ .name }}` }}"
      syncPolicy:
        automated:
          prune: true
