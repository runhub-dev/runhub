apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: runhub-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  sourceRepos:
    - "*"
  destinations:
    - namespace: "{{ .Release.Namespace }}"
      name: in-cluster
    - namespace: argocd
      name: in-cluster
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
