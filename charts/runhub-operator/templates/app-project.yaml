apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: runhub-operator
  namespace: argocd
spec:
  sourceNamespaces:
    - runhub
  sourceRepos:
    - "{{ .Values.runhubRepository }}"
  destinations:
    - name: in-cluster
      namespace: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
