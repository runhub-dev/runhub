apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: runhub-operator
  namespace: argocd
spec:
  sourceNamespaces:
    - runhub
  sourceRepos:
    {{- if get .Values "dev" }}
    - "{{ .Values.dev.repository }}"
    {{- else }}
    - "{{ .Values.runhub.repository }}"
    - "{{ .Values.infra.repository }}"
    {{- end }}
  destinations:
    - name: in-cluster
      namespace: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
