apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: runhub
  labels:
    app.kubernetes.io/name: runhub
  namespace: argocd
spec:
  project: runhub
  source:
    repoURL: "{{ .Values.repoURL }}"
    targetRevision: "{{ .Values.revision }}"
    path: charts/runhub
    helm:
      values: |
        {{- toYaml .Values | nindent 8 }}
  destination:
    name: in-cluster
    namespace: runhub
  syncPolicy:
    automated: {}
