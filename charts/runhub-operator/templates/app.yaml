apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: runhub
  namespace: argocd
spec:
  project: runhub-operator
  source:
    repoURL: "{{ .Values.repoURL }}"
    targetRevision: "{{ .Values.revision }}"
    path: charts/runhub
    helm:
      valuesObject: {{ toYaml .Values | nindent 8 }}
  destination:
    name: in-cluster
    namespace: runhub
  syncPolicy:
    automated:
      prune: true
