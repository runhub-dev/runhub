apiVersion: k3d.io/v1alpha4
kind: Simple
metadata:
  name: runhub
image: latest
registries:
  create:
    name: k3d-runhub-registry
options:
  k3d:
    disableLoadbalancer: true
  k3s:
    extraArgs:
      - arg: --disable=local-storage
        nodeFilters:
          - server:*
      - arg: --disable=traefik
        nodeFilters:
          - server:*
